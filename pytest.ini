[pytest]
markers =
    integration: marker for tests that hit the real database/api

filterwarnings =
    ignore::DeprecationWarning
    ignore::pyparsing.warnings.PyparsingDeprecationWarning
    ignore::UserWarning
[coverage:run]
omit =
    */conftest.py
    */tests/*
    */__pycache__/*

[coverage:report]
fail_under = 55
